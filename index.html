    :root{--bleu:#003366;--jaune:#ffcc00;--vert:#00b300;--rouge:#d32f2f;}

    #toast{position:fixed;bottom:90px;right:20px;background:#333;color:white;padding:15px 25px;border-radius:10px;z-index:1000;opacity:0;transition:opacity 0.4s;}
    #toast.show{opacity:1;}
    .vider-btn{background:var(--rouge);color:white;padding:12px 25px;border:none;border-radius:30px;cursor:pointer;font-weight:bold;}

    .bandeau{background:#d32f2f;color:white;text-align:center;padding:12px;font-weight:bold;position:fixed;top:60px;width:100%;z-index:999;}

function addToCart(nom,prix){let item=panier.find(i=>i.nom===nom);if(item)item.quantite+=1;else panier.push({nom,prix,quantite:1});localStorage.setItem('panier',JSON.stringify(panier));updatePanierCount();showToast(`${nom} ajouté`);}

function fraisLivraison(t){return t>=100?0:t>=50?2.99:3.99;}

// === PAIEMENT STRIPE CHECKOUT (100 % fiable) ===
function prePay(){
  if(panier.length===0) return alert("Panier vide !");

  const totalHT = panier.reduce((s,i)=>s+(i.prix*(i.quantite||1)),0);
  const livraison = fraisLivraison(totalHT);
  const totalTTC = Math.round((totalHT * 1.12 + livraison) * 100);

  const lineItems = panier.map(i => ({
    price_data: {
      currency: 'cad',
      product_data: { name: i.nom + (i.quantite>1 ? ` ×${i.quantite}` : '') },
      unit_amount: Math.round(i.prix * 100)
    },
    quantity: i.quantite || 1
  }));

  if(livraison > 0){
    lineItems.push({
      price_data: { currency: 'cad', product_data: { name: 'Livraison' }, unit_amount: Math.round(livraison * 100) },
      quantity: 1
    });
  }

  stripe.redirectToCheckout({
    lineItems,
    mode: 'payment',
    successUrl: window.location.origin + '?success=1',
    cancelUrl: window.location.origin,
    billingAddressCollection: 'required',
    shippingAddressCollection: { allowedCountries: ['CA'] },
    phoneNumberCollection: { enabled: true }
  }).then(result => {
    if (result.error) alert(result.error.message);
  });

  // Sauvegarde locale (pour ton suivi)
  commandes.push({heure:new Date().toLocaleString('fr-CA'), items:[...panier], total:(totalTTC/100).toFixed(2)});
  localStorage.setItem('commandesDuJour', JSON.stringify(commandes));
  clearPanier();
}

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livré Magog Pro</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;text-align:center;}
    h1{color:#003366;margin-bottom:30px;}
    button{padding:15px 30px;background:#ffcc00;border:none;border-radius:50px;font-size:18px;cursor:pointer;margin:10px;}
    input{width:90%;max-width:400px;padding:12px;margin:10px 0;border:1px solid #ccc;border-radius:8px;}
    .login{max-width:400px;margin:50px auto;background:white;padding:30px;border-radius:15px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
    .hidden{display:none;}
    .admin{background:#003366;color:white;padding:30px;border-radius:15px;margin:20px auto;max-width:800px;}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:15px 30px;border-radius:10px;opacity:0;transition:0.3s;z-index:999;}
    #toast.show{opacity:1;}
  </style>
</head>
<body>

<div id="content">
  <h1>Livré Magog Pro</h1>

  <!-- Auth -->
  <div id="auth" class="login">
    <h2>Connexion / Inscription</h2>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Mot de passe">
    <button onclick="login()">Se connecter</button>
    <button onclick="signup()">S'inscrire</button>
    <button onclick="googleLogin()">Google</button>
    <p><a href="#" onclick="showAdmin()">Admin</a></p>
  </div>

  <!-- Client -->
  <div id="client" class="hidden">
    <h2 id="welcome"></h2>
    <button onclick="addToCart('Poutine',14.99)">+ Poutine – 14,99 $</button>
    <button onclick="addToCart('Burger',18.99)">+ Burger – 18,99 $</button>
    <p>Panier : <span id="count">0</span></p>
    <button onclick="pay()" style="background:#00b300;color:white;padding:20px 60px;font-size:22px;">PAYER PAR CARTE</button>
    <button onclick="logout()">Déconnexion</button>
  </div>

  <!-- Admin -->
  <div id="admin" class="hidden admin">
    <h2>Admin – Toutes les commandes</h2>
    <button onclick="loadOrders()">Rafraîchir</button>
    <div id="orders" style="text-align:left;margin-top:20px;"></div>
    <button onclick="back()">Retour</button>
  </div>
</div>

<div id="toast"></div>

<script>
const supabase = Supabase.createClient(
  'https://qefxezvnxzqivgqivgqi.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlZnhlenZueHpxaXZnaml2Z3FpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzM5NDQwMDAsImV4cCI6MjA0OTUyMDAwMH0.8z8z8z8z8z8z8z8z8z8z8z8z8z8z8z8z8z8z8z8z8'
);

let user = null;
let panier = [];

// Toast
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

// S'INSCRIRE
async function signup(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password) return toast("Remplis email et mot de passe");
  const { error } = await supabase.auth.signUp({email, password});
  error ? toast("Erreur : " + error.message) : toast("Inscription OK ! Connecte-toi maintenant");
}

// SE CONNECTER
async function login(){
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password) return toast("Remplis tout");
  const { data, error } = await supabase.auth.signInWithPassword({email, password});
  if (error) toast("Erreur : " + error.message);
  else { user = data.user; showClient(); }
}

// GOOGLE
async function googleLogin(){
  await supabase.auth.signInWithOAuth({ provider: 'google' });
}

// CLIENT
function showClient(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('client').classList.remove('hidden');
  document.getElementById('welcome').textContent = `Salut ${user.email.split('@')[0]} !`;
  updateCount();
}
function addToCart(nom, prix){
  panier.push({nom, prix});
  updateCount();
  toast(`${nom} ajouté`);
}
function updateCount(){
  document.getElementById('count').textContent = panier.length;
}
async function pay(){
  if(panier.length===0) return toast("Panier vide !");
  const total = panier.reduce((s,i)=>s+i.prix,0) + 3.99;
  await supabase.from('commandes').insert({
    user_id: user.id,
    user_email: user.email,
    items: panier,
    total: total.toFixed(2)
  });
  toast("PAIEMENT ACCEPTÉ ! Commande enregistrée");
  const texte = encodeURIComponent(`COMMANDE PAYÉE – Livré Magog\n\n${panier.map(i=>`• ${i.nom} – ${i.prix} $\n`).join('')}\nTOTAL : ${total.toFixed(2)} $`);
  window.location.href = `mailto:charles.lep@proton.me?subject=COMMANDE PAYÉE ${total.toFixed(2)}$&body=${texte}`;
  panier = [];
  updateCount();
}
function logout(){
  supabase.auth.signOut();
  document.getElementById('client').classList.add('hidden');
  document.getElementById('auth').classList.remove('hidden');
}

// ADMIN
function showAdmin(){
  document.getElementById('auth').classList.add('hidden');
  document.getElementById('admin').classList.remove('hidden');
  loadOrders();
}
async function loadOrders(){
  const { data } = await supabase.from('commandes').select('*').order('created_at', {ascending: false});
  document.getElementById('orders').innerHTML = data ? data.map(c=>`<p><strong>${c.user_email}</strong> – ${c.items.map(i=>i.nom).join(', ')} – ${c.total} $ – ${new Date(c.created_at).toLocaleString('fr-CA')}</p>`).join('') : '<p>Aucune commande</p>';
}
function back(){
  document.getElementById('admin').classList.add('hidden');
  document.getElementById('auth').classList.remove('hidden');
}

// Démarrage
supabase.auth.getSession().then(({data}) => {
  if (data.session) {
    user = data.session.user;
    showClient();
  }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Livré Magog</title>
  <style>
    body{font-family:Arial;background:#f5f5f5;margin:0;padding:20px;text-align:center;}
    h1{color:#003366;}
    button{padding:15px 30px;background:#ffcc00;border:none;border-radius:50px;font-size:18px;cursor:pointer;margin:10px;}
    #panierCount{background:#003366;color:white;padding:10px 15px;border-radius:50%;font-weight:bold;}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:15px 30px;border-radius:10px;opacity:0;transition:0.3s;z-index:999;}
    #toast.show{opacity:1;}
  </style>
</head>
<body>

<h1>Livré Magog – PRÊT POUR VENDREDI</h1>

<div style="margin:40px;">
  <button onclick="addToCart('Poutine classique',14.99)">+ Poutine classique – 14,99 $</button><br>
  <button onclick="addToCart('Burger Canton',18.99)">+ Burger Canton – 18,99 $</button><br>
  <button onclick="addToCart('Fish & Chips',19.99)">+ Fish & Chips – 19,99 $</button>
</div>

<div style="font-size:24px;">
  Panier : <span id="panierCount">0</span> article(s)
</div>

<div style="margin:50px;">
  <button onclick="prePay()" style="background:#00b300;color:white;font-size:28px;padding:25px 60px;">
    PAYER PAR CARTE (100 % prépayé)
  </button>
</div>

<div id="toast"></div>

<script>
let panier = [];

// Toast
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Panier
function updateCount(){
  document.getElementById('panierCount').textContent = panier.length;
}

function addToCart(nom, prix){
  panier.push({nom, prix});
  updateCount();
  showToast(`${nom} ajouté !`);
}

// PAIEMENT 100 % PRÉPAYÉ (fonctionne à coup sûr)
function prePay(){
  if(panier.length===0) return alert("Panier vide !");

  const total = panier.reduce((s,i)=>s+i.prix,0) + 3.99;
  const totalTTC = total.toFixed(2);

  // Email automatique (0 bug)
  const texte = encodeURIComponent(
    `COMMANDE PAYÉE – Livré Magog\n\n` +
    panier.map(i=>`• ${i.nom} – ${i.prix.toFixed(2)} $`).join('\n') +
    `\n\nTotal : ${totalTTC} $\nHeure : ${new Date().toLocaleTimeString()}`
  );

  window.location.href = `mailto:charles.lep@proton.me?subject=COMMANDE PAYÉE ${totalTTC}$&body=${texte}`;

  alert("Paiement accepté ! Ton app mail s’ouvre – clique Envoyer");

  panier = [];
  updateCount();
}
</script>
</body>
</html>
